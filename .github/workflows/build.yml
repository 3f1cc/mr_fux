name: Build Android APK

on:
  push:
    branches:
      - 'claude/**'
      - 'main'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Show Android SDK info
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms dir"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "no build-tools dir"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tee /tmp/build.log; exit ${PIPESTATUS[0]}

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mr-fux-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7
